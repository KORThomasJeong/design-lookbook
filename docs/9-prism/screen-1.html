<!DOCTYPE html>
<html lang="ko" data-preset="9" data-variants="a,b" data-theme="dark">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>빛 — 캔버스 · Prism 데모</title>
<link rel="stylesheet" href="tokens.css">
<link rel="stylesheet" href="app.css">
<style>
/* screen-1 캔버스 + 패널 (§9) — 화면 고유 레이아웃 치수만 */
.artboard { width: 480px; height: 270px; }
.ab-rect { position: absolute; left: 64px; top: 56px; width: 200px; height: 128px; background: var(--color-primary-soft); border: var(--border-width) solid var(--color-primary); border-radius: var(--radius-sm); }
.ab-circle { position: absolute; right: 40px; top: 40px; width: 88px; height: 88px; background: var(--color-success-soft); border-radius: var(--radius-full); }
.ab-text { position: absolute; left: 64px; bottom: 32px; color: var(--color-text); font-size: var(--font-size-body-lg); font-weight: var(--font-weight-semibold); }
.swatch-row { display: flex; align-items: center; gap: var(--space-3); }
.opacity-val { width: 48px; text-align: right; font-variant-numeric: tabular-nums; color: var(--color-text-sub); font-size: var(--font-size-caption); }
</style>
<script src="../assets/preset-loader.js" defer></script>
<script src="app.js" defer></script>
</head>
<body>
<div class="studio">

  <!-- 메뉴바 (§6.5) -->
  <header class="menubar">
    <span class="appmark"><span class="glyph" aria-hidden="true">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3 3 8v8l9 5 9-5V8z"/><path d="m3 8 9 5 9-5M12 13v8"/></svg>
    </span>빛</span>
    <nav class="menubar-menu" aria-label="메뉴">
      <button class="menu-item" type="button">파일</button>
      <button class="menu-item" type="button">편집</button>
      <button class="menu-item" type="button">보기</button>
    </nav>
    <span class="menubar-doc t-caption"><span class="docname">청춘 포스터 · 리뉴얼</span><span class="save-dot" aria-hidden="true"></span>저장됨 · 방금</span>
    <div class="menubar-actions">
      <button class="iconbtn" type="button" aria-label="공유" onclick="bitToast('공유 링크를 복사했어요')">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><path d="m8.6 13.5 6.8 4M15.4 6.5l-6.8 4"/></svg>
      </button>
      <a class="btn btn-primary" href="screen-4.html">내보내기</a>
    </div>
  </header>

  <div class="workspace">

    <!-- 좌측 툴 레일 (§6.5) — 도구 + 화면 내비 -->
    <nav class="rail" aria-label="도구 및 화면">
      <button class="toolbtn" type="button" aria-pressed="true" aria-label="선택 도구 (V)" title="선택 (V)">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M5 4l7 16 2.5-6.5L21 11z"/></svg>
      </button>
      <button class="toolbtn" type="button" aria-pressed="false" aria-label="도형 (R)" title="도형 (R)">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="4" y="4" width="16" height="16" rx="2"/></svg>
      </button>
      <button class="toolbtn" type="button" aria-pressed="false" aria-label="펜 (P)" title="펜 (P)">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 19l7-7-4-4-7 7-1 5z"/><path d="M15 8l1-4 4 4-4 1"/></svg>
      </button>
      <button class="toolbtn" type="button" aria-pressed="false" aria-label="텍스트 (T)" title="텍스트 (T)">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M5 6h14M12 6v13M9 19h6"/></svg>
      </button>
      <button class="toolbtn" type="button" aria-pressed="false" aria-label="손 도구 (H)" title="손 도구 (H)">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M8 12V6a1.5 1.5 0 0 1 3 0v5m0-.5V5a1.5 1.5 0 0 1 3 0v6m0-.5V6.5a1.5 1.5 0 0 1 3 0V14a6 6 0 0 1-6 6h-1a5 5 0 0 1-4-2l-3-4a1.5 1.5 0 0 1 2.4-1.8L8 14"/></svg>
      </button>
      <span class="rail-spacer"></span>
      <span class="rail-divider" aria-hidden="true"></span>
      <a class="toolbtn" href="screen-2.html" aria-label="에셋 라이브러리" title="에셋 라이브러리">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg>
      </a>
      <a class="toolbtn" href="screen-5.html" aria-label="환경설정" title="환경설정">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="3"/><path d="M19 12a7 7 0 0 0-.1-1.2l2-1.5-2-3.4-2.3 1a7 7 0 0 0-2-1.2l-.3-2.5H8.7l-.3 2.5a7 7 0 0 0-2 1.2l-2.3-1-2 3.4 2 1.5A7 7 0 0 0 4 12c0 .4 0 .8.1 1.2l-2 1.5 2 3.4 2.3-1a7 7 0 0 0 2 1.2l.3 2.5h4.6l.3-2.5a7 7 0 0 0 2-1.2l2.3 1 2-3.4-2-1.5c.1-.4.1-.8.1-1.2z"/></svg>
      </a>
    </nav>

    <!-- 캔버스 (§9) -->
    <main class="canvaswrap enter" aria-label="캔버스">
      <div class="artboard">
        <span class="artboard-label t-micro num">아트보드 1 · 1920 × 1080</span>
        <div class="ab-circle" aria-hidden="true"></div>
        <div class="ab-rect" aria-hidden="true"></div>
        <span class="ab-text">봄날의 기록</span>
        <!-- 선택 상태: 사각형 + 8핸들 (§9) -->
        <div class="selbox" style="left:64px; top:56px; width:200px; height:128px;" aria-hidden="true">
          <span class="handle nw"></span><span class="handle n"></span><span class="handle ne"></span>
          <span class="handle e"></span><span class="handle se"></span><span class="handle s"></span>
          <span class="handle sw"></span><span class="handle w"></span>
        </div>
      </div>
    </main>

    <!-- 우측 속성 패널 (§6.3) -->
    <aside class="panel" id="panel" aria-label="속성">
      <span class="grabbar" aria-hidden="true"></span>

      <section class="pgroup" data-open="true">
        <button class="pgroup-head" type="button" data-toggle aria-expanded="true">
          <svg class="caret" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="m6 9 6 6 6-6"/></svg>
          <span class="pgroup-title">레이어</span>
          <span class="action" role="button" tabindex="0" aria-label="레이어 추가" onclick="bitToast('빈 레이어를 추가했어요')">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 5v14M5 12h14"/></svg>
          </span>
        </button>
        <div class="pgroup-body" style="gap: var(--space-1);">
          <ul data-select-list>
            <li><a class="row" href="screen-3.html" data-selectable aria-selected="true">
              <span class="thumb"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M5 6h14M12 6v13M9 19h6"/></svg></span>
              <span class="rlabel t-body ellip">봄날의 기록</span>
              <span class="meta"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M2 12s3.5-6 10-6 10 6 10 6-3.5 6-10 6-10-6-10-6z"/><circle cx="12" cy="12" r="2.5"/></svg></span>
            </a></li>
            <li><button class="row" data-selectable aria-selected="false" type="button">
              <span class="thumb"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="4" y="4" width="16" height="16" rx="2"/></svg></span>
              <span class="rlabel t-body ellip">강조 사각형</span>
              <span class="meta num">80%</span>
            </button></li>
            <li><button class="row" data-selectable aria-selected="false" type="button">
              <span class="thumb"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="8"/></svg></span>
              <span class="rlabel t-body ellip">원형 포인트</span>
              <span class="meta num">100%</span>
            </button></li>
            <li><button class="row" data-selectable aria-selected="false" type="button">
              <span class="thumb"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M4 16l5-6 4 4 3-4 4 6z"/><circle cx="8" cy="7" r="1.5"/></svg></span>
              <span class="rlabel t-body ellip">배경 이미지</span>
              <span class="meta"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="5" y="11" width="14" height="9" rx="2"/><path d="M8 11V8a4 4 0 0 1 8 0v3"/></svg></span>
            </button></li>
            <li><button class="row" data-selectable aria-selected="false" type="button">
              <span class="thumb"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="4" y="4" width="16" height="16" rx="2"/></svg></span>
              <span class="rlabel t-body ellip">배경</span>
              <span class="meta num">100%</span>
            </button></li>
          </ul>
        </div>
      </section>

      <section class="pgroup" data-open="true">
        <button class="pgroup-head" type="button" data-toggle aria-expanded="true">
          <svg class="caret" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="m6 9 6 6 6-6"/></svg>
          <span class="pgroup-title">정렬</span>
        </button>
        <div class="pgroup-body">
          <div class="field-grid">
            <label class="field-stack"><span class="label">X</span>
              <span class="field stepper"><input type="text" value="240" aria-label="X 좌표" inputmode="numeric"><span class="unit">px</span>
                <span class="carets"><button type="button" data-step="up" aria-label="X 증가"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="m6 15 6-6 6 6"/></svg></button><button type="button" data-step="down" aria-label="X 감소"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="m6 9 6 6 6-6"/></svg></button></span></span>
            </label>
            <label class="field-stack"><span class="label">Y</span>
              <span class="field stepper"><input type="text" value="160" aria-label="Y 좌표" inputmode="numeric"><span class="unit">px</span>
                <span class="carets"><button type="button" data-step="up" aria-label="Y 증가"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="m6 15 6-6 6 6"/></svg></button><button type="button" data-step="down" aria-label="Y 감소"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="m6 9 6 6 6-6"/></svg></button></span></span>
            </label>
            <label class="field-stack"><span class="label">W</span>
              <span class="field stepper"><input type="text" value="800" aria-label="너비" inputmode="numeric"><span class="unit">px</span>
                <span class="carets"><button type="button" data-step="up" aria-label="너비 증가"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="m6 15 6-6 6 6"/></svg></button><button type="button" data-step="down" aria-label="너비 감소"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="m6 9 6 6 6-6"/></svg></button></span></span>
            </label>
            <label class="field-stack"><span class="label">H</span>
              <span class="field stepper"><input type="text" value="512" aria-label="높이" inputmode="numeric"><span class="unit">px</span>
                <span class="carets"><button type="button" data-step="up" aria-label="높이 증가"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="m6 15 6-6 6 6"/></svg></button><button type="button" data-step="down" aria-label="높이 감소"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="m6 9 6 6 6-6"/></svg></button></span></span>
            </label>
          </div>
        </div>
      </section>

      <section class="pgroup" data-open="true">
        <button class="pgroup-head" type="button" data-toggle aria-expanded="true">
          <svg class="caret" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="m6 9 6 6 6-6"/></svg>
          <span class="pgroup-title">모양</span>
        </button>
        <div class="pgroup-body">
          <div class="field-row">
            <span class="label">채움</span>
            <span class="swatch-row">
              <span class="swatch" style="background: var(--color-primary);" aria-hidden="true"></span>
              <span class="mono t-caption">3B63FB</span>
            </span>
          </div>
          <div class="field-row">
            <span class="label">불투명도</span>
            <span class="slider"><input type="range" min="0" max="100" value="80" aria-label="불투명도"></span>
            <span class="opacity-val">80%</span>
          </div>
          <div class="field-row">
            <span class="label">그림자</span>
            <span class="toggle" role="switch" tabindex="0" aria-checked="false" aria-label="그림자" data-toast="그림자를"></span>
          </div>
        </div>
      </section>
    </aside>

  </div>

  <!-- 상태바 (§6.6) -->
  <footer class="statusbar">
    <span>줌 100%</span>
    <span>1920 × 1080px</span>
    <span class="push">X 240　Y 160</span>
  </footer>

  <!-- 모바일 탭바 (§6.6) -->
  <nav class="tabbar" aria-label="화면 이동">
    <a class="tab" href="screen-1.html" aria-current="page"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="4" width="18" height="14" rx="2"/><path d="M3 18h18"/></svg><span class="tlabel">캔버스</span></a>
    <a class="tab" href="screen-2.html"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg><span class="tlabel">에셋</span></a>
    <a class="tab" href="screen-3.html"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M4 6h16M4 12h10M4 18h7"/></svg><span class="tlabel">속성</span></a>
    <a class="tab" href="screen-4.html"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 3v12m0 0-4-4m4 4 4-4M5 21h14"/></svg><span class="tlabel">내보내기</span></a>
    <a class="tab" href="screen-5.html"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="3"/><path d="M19 12a7 7 0 0 0-.1-1.2l2-1.5-2-3.4-2.3 1a7 7 0 0 0-2-1.2l-.3-2.5H8.7l-.3 2.5a7 7 0 0 0-2 1.2l-2.3-1-2 3.4 2 1.5A7 7 0 0 0 4 12c0 .4 0 .8.1 1.2l-2 1.5 2 3.4 2.3-1a7 7 0 0 0 2 1.2l.3 2.5h4.6l.3-2.5a7 7 0 0 0 2-1.2l2.3 1 2-3.4-2-1.5c.1-.4.1-.8.1-1.2z"/></svg><span class="tlabel">설정</span></a>
  </nav>

  <!-- 토스트 (§6.8) -->
  <div class="toast" id="toast" role="status" aria-live="polite">
    <span class="ico" aria-hidden="true"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg></span>
    <span class="toast-msg"></span>
  </div>

</div>
</body>
</html>
