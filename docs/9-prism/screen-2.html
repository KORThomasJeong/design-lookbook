<!DOCTYPE html>
<html lang="ko" data-preset="9" data-variants="a,b" data-theme="dark">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>빛 — 에셋 라이브러리 · Prism 데모</title>
<link rel="stylesheet" href="tokens.css">
<link rel="stylesheet" href="app.css">
<style>
/* screen-2 에셋 라이브러리 (§9) — 화면 고유 레이아웃 치수 */
.center-2 { display: flex; min-width: 0; min-height: 0; background: var(--color-bg); }
.tree {
  width: 180px; flex: none; overflow-y: auto;
  background: var(--color-surface); border-right: var(--border-width) solid var(--color-border);
  padding: var(--space-4) var(--space-3);
  display: flex; flex-direction: column; gap: var(--space-1);
}
.tree .tree-cap { padding: var(--space-3) var(--space-4) var(--space-2); }
.grid-area { flex: 1; min-width: 0; display: flex; flex-direction: column; }
.grid-scroll { flex: 1; min-height: 0; overflow-y: auto; padding: var(--space-6); }
.filterbar { display: flex; align-items: center; gap: var(--space-4); }
.filterbar .search { flex: 1; max-width: 320px; }
.field .lead { color: var(--color-text-tertiary); }
.preview-hero {
  aspect-ratio: 1 / 1; border-radius: var(--radius-md);
  background: var(--color-surface-sunken);
  display: grid; place-items: center; color: var(--color-text-sub);
  margin-bottom: var(--space-5);
}
.meta-list { display: flex; flex-direction: column; gap: var(--space-3); margin-bottom: var(--space-6); }
.meta-list .mrow { display: flex; align-items: baseline; gap: var(--space-4); }
.meta-list .mkey { width: 72px; flex: none; color: var(--color-text-sub); font-size: var(--font-size-caption); }
.meta-list .mval { color: var(--color-text); font-size: var(--font-size-caption); font-variant-numeric: tabular-nums; }
.panel-head { display: flex; align-items: center; gap: var(--space-3); padding: var(--space-5) var(--space-5) var(--space-4); border-bottom: var(--border-width) solid var(--color-border); }
.panel-pad { padding: var(--space-5); }
@media (max-width: 767px) {
  .tree { display: none; }
  .grid-scroll { padding: var(--space-5); }
  .assetgrid { grid-template-columns: 1fr 1fr; }
}
</style>
<script src="../assets/preset-loader.js" defer></script>
<script src="app.js" defer></script>
</head>
<body>
<div class="studio">

  <div class="workspace">

    <nav class="rail" aria-label="도구 및 화면">

        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="4" width="18" height="14" rx="2"/><path d="M3 18h18"/></svg>

      <a class="toolbtn" href="screen-2.html" aria-current="page" aria-label="에셋 라이브러리" title="에셋 라이브러리">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg>

        <button class="row" data-selectable aria-selected="false" type="button">

      <div class="grid-area">
        <!-- 필터 바 (§6.5) -->
        <div class="ctxbar filterbar">

            <span class="chev" aria-hidden="true"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg></span>
          </span>
          <span class="seg" data-seg role="group" aria-label="보기 방식">

          </span>
        </div>

        <!-- 에셋 그리드 (§6.3) -->
        <div class="grid-scroll">
          <div class="assetgrid enter" data-select-list>
            <button class="assetcard" data-selectable data-panel-open aria-selected="true" type="button">

              <span class="badge badge-primary">컴포넌트</span>
            </button>
            <button class="assetcard" data-selectable data-panel-open aria-selected="false" type="button">
              <span class="preview"><svg width="52" height="52" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="4" y="4" width="16" height="16" rx="2"/><circle cx="9" cy="9" r="1.5"/><path d="m5 16 4-3 3 2 4-4 3 3"/></svg></span>

              <span class="cname ellip">내비게이션 바</span>

            <button class="assetcard" data-selectable data-panel-open aria-selected="false" type="button">
              <span class="preview"><svg width="52" height="52" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="9" r="3.5"/><path d="M5 20a7 7 0 0 1 14 0"/></svg></span>

              <span class="cname ellip">탭바 · 5칸</span>
              <span class="badge badge-primary">컴포넌트</span>
            </button>
            <button class="assetcard" data-selectable data-panel-open aria-selected="false" type="button">
              <span class="preview"><svg width="52" height="52" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="4" y="8" width="16" height="8" rx="4"/><path d="m8 12 2 2 4-4"/></svg></span>

        </div>

    <!-- 미리보기 패널 (§6.3) -->

  </div>
