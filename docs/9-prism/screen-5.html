<!DOCTYPE html>
<html lang="ko" data-preset="9" data-variants="a,b" data-theme="dark">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>빛 — 환경설정 · Prism 데모</title>
<link rel="stylesheet" href="tokens.css">
<link rel="stylesheet" href="app.css">
<style>
/* screen-5 환경설정 (§9) — 화면 고유 레이아웃 치수 */
.workspace.prefs { grid-template-columns: var(--layout-rail-width) minmax(0, 1fr); }
.prefs-main { display: flex; min-width: 0; min-height: 0; background: var(--color-bg); }
.settings-nav {
  width: 200px; flex: none; overflow-y: auto;
  background: var(--color-surface); border-right: var(--border-width) solid var(--color-border);
  padding: var(--space-4) var(--space-3);
  display: flex; flex-direction: column; gap: var(--space-4);
}
.settings-search { }
.settings-list { display: flex; flex-direction: column; gap: var(--space-1); }
.settings-body { flex: 1; min-width: 0; overflow-y: auto; padding: var(--space-9) var(--space-10); }
.settings-inner { max-width: 640px; }
.set-section { margin-bottom: var(--space-9); }
.set-section > h2 { margin-bottom: var(--space-6); }
.set-row {
  display: flex; align-items: center; gap: var(--space-6);
  padding: var(--space-4) 0;
  border-bottom: var(--border-width) solid var(--color-border);
}
.set-row .set-label { width: 160px; flex: none; }
.set-row .set-label .desc { color: var(--color-text-sub); font-size: var(--font-size-caption); margin-top: var(--space-1); }
.set-row .set-control { flex: 1; display: flex; align-items: center; gap: var(--space-4); min-width: 0; }
.set-row .set-control.end { justify-content: flex-end; }
.accent-swatches { display: flex; gap: var(--space-3); }
.pref-foot { margin-top: var(--space-8); }
@media (max-width: 767px) {
  .settings-nav { display: none; }
  .settings-body { padding: var(--space-6) var(--space-5); }
  .set-row { flex-direction: column; align-items: flex-start; gap: var(--space-3); }
  .set-row .set-label { width: auto; }
  .set-row .set-control { width: 100%; }
}
</style>
<script src="../assets/preset-loader.js" defer></script>
<script src="app.js" defer></script>
</head>
<body>
<div class="studio">

  <header class="menubar">
    <span class="appmark"><span class="glyph" aria-hidden="true">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3 3 8v8l9 5 9-5V8z"/><path d="m3 8 9 5 9-5M12 13v8"/></svg>
    </span>빛</span>
    <span class="menubar-doc t-caption"><span class="docname">환경설정</span></span>
    <div class="menubar-actions">
      <a class="btn btn-secondary" href="screen-1.html">편집으로 돌아가기</a>
    </div>
  </header>

  <div class="workspace prefs">

    <nav class="rail" aria-label="도구 및 화면">
      <a class="toolbtn" href="screen-1.html" aria-label="캔버스" title="캔버스">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="4" width="18" height="14" rx="2"/><path d="M3 18h18"/></svg>
      </a>
      <a class="toolbtn" href="screen-2.html" aria-label="에셋 라이브러리" title="에셋 라이브러리">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg>
      </a>
      <span class="rail-spacer"></span>
      <span class="rail-divider" aria-hidden="true"></span>
      <a class="toolbtn" href="screen-5.html" aria-current="page" aria-label="환경설정" title="환경설정">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="3"/><path d="M19 12a7 7 0 0 0-.1-1.2l2-1.5-2-3.4-2.3 1a7 7 0 0 0-2-1.2l-.3-2.5H8.7l-.3 2.5a7 7 0 0 0-2 1.2l-2.3-1-2 3.4 2 1.5A7 7 0 0 0 4 12c0 .4 0 .8.1 1.2l-2 1.5 2 3.4 2.3-1a7 7 0 0 0 2 1.2l.3 2.5h4.6l.3-2.5a7 7 0 0 0 2-1.2l2.3 1 2-3.4-2-1.5c.1-.4.1-.8.1-1.2z"/></svg>
      </a>
    </nav>

    <div class="prefs-main">
      <!-- 설정 카테고리 내비 (§6.4) -->
      <nav class="settings-nav" aria-label="설정 카테고리">
        <span class="field settings-search">
          <span aria-hidden="true" style="color: var(--color-text-tertiary);"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg></span>
          <input type="search" placeholder="설정 검색" aria-label="설정 검색" style="margin-left: var(--space-3);">
        </span>
        <div class="settings-list" data-select-list>
          <button class="row" data-selectable aria-selected="false" type="button"><span class="rlabel t-body">일반</span></button>
          <button class="row" data-selectable aria-selected="true" type="button"><span class="rlabel t-body">모양</span></button>
          <button class="row" data-selectable aria-selected="false" type="button"><span class="rlabel t-body">단축키</span></button>
          <button class="row" data-selectable aria-selected="false" type="button"><span class="rlabel t-body">성능</span></button>
          <button class="row" data-selectable aria-selected="false" type="button"><span class="rlabel t-body">계정</span></button>
        </div>
      </nav>

      <!-- 설정 폼 -->
      <main class="settings-body enter" aria-label="모양 설정">
        <div class="settings-inner">
          <h1 class="t-heading-l" style="margin-bottom: var(--space-8);">모양</h1>

          <section class="set-section">
            <div class="set-row">
              <div class="set-label"><span class="t-body-lg">테마</span><span class="desc">작업 환경 밝기</span></div>
              <div class="set-control end">
                <span class="seg" data-seg role="group" aria-label="테마">
                  <button type="button" aria-pressed="false">라이트</button>
                  <button type="button" aria-pressed="true">다크</button>
                  <button type="button" aria-pressed="false">시스템</button>
                </span>
              </div>
            </div>

            <div class="set-row">
              <div class="set-label"><span class="t-body-lg">강조 색상</span><span class="desc">선택·주 액션 색</span></div>
              <div class="set-control end">
                <span class="accent-swatches" data-select-list role="group" aria-label="강조 색상">
                  <button class="swatch-btn" data-selectable aria-selected="true" type="button" aria-label="파랑"><span class="swatch round selected" style="background:var(--color-primary);"></span></button>
                  <button class="swatch-btn" data-selectable aria-selected="false" type="button" aria-label="바이올렛"><span class="swatch round" style="background:var(--color-primary-b);"></span></button>
                </span>
              </div>
            </div>

            <div class="set-row">
              <div class="set-label"><span class="t-body-lg">UI 밀도</span><span class="desc">컨트롤 간격</span></div>
              <div class="set-control end">
                <span class="select" style="max-width: 180px;">
                  <select aria-label="UI 밀도"><option>기본 (32px)</option><option>촘촘 (24px)</option><option>여유 (40px)</option></select>
                  <span class="chev" aria-hidden="true"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg></span>
                </span>
              </div>
            </div>

            <div class="set-row">
              <div class="set-label"><span class="t-body-lg">캔버스 배경</span><span class="desc">페이스트보드 색</span></div>
              <div class="set-control end">
                <span class="accent-swatches" data-select-list role="group" aria-label="캔버스 배경">
                  <button class="swatch-btn" data-selectable aria-selected="true" type="button" aria-label="진회색"><span class="swatch selected" style="background: var(--color-canvas);"></span></button>
                  <button class="swatch-btn" data-selectable aria-selected="false" type="button" aria-label="검정"><span class="swatch" style="background:var(--color-canvas-black);"></span></button>
                  <button class="swatch-btn" data-selectable aria-selected="false" type="button" aria-label="흰색"><span class="swatch" style="background:var(--color-canvas-white);"></span></button>
                </span>
              </div>
            </div>

            <div class="set-row">
              <div class="set-label"><span class="t-body-lg">그리드 표시</span><span class="desc">8px 배경 격자</span></div>
              <div class="set-control end">
                <span class="toggle" role="switch" tabindex="0" aria-checked="true" aria-label="그리드 표시" data-toast="그리드 표시를"></span>
              </div>
            </div>
          </section>

          <section class="set-section">
            <h2 class="t-heading-m">자동 저장</h2>
            <div class="set-row">
              <div class="set-label"><span class="t-body-lg">자동 저장</span><span class="desc">변경 내용 자동 보관</span></div>
              <div class="set-control end">
                <span class="toggle" role="switch" tabindex="0" aria-checked="true" aria-label="자동 저장" data-toast="자동 저장을"></span>
              </div>
            </div>
            <div class="set-row">
              <div class="set-label"><span class="t-body-lg">저장 간격</span><span class="desc">자동 저장 주기</span></div>
              <div class="set-control end">
                <span class="field stepper" style="max-width: 120px;"><input type="text" value="5" aria-label="저장 간격" inputmode="numeric"><span class="unit">분</span>
                  <span class="carets"><button type="button" data-step="up" aria-label="간격 증가"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="m6 15 6-6 6 6"/></svg></button><button type="button" data-step="down" aria-label="간격 감소"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="m6 9 6 6 6-6"/></svg></button></span></span>
              </div>
            </div>
          </section>

          <div class="pref-foot">
            <button class="btn btn-quiet" type="button" onclick="bitToast('모양 설정을 기본값으로 되돌렸어요')">기본값으로 재설정</button>
          </div>
        </div>
      </main>
    </div>

  </div>

  <footer class="statusbar">
    <span>환경설정</span>
    <span class="push">빛 스튜디오 v2.4.0</span>
  </footer>

  <nav class="tabbar" aria-label="화면 이동">
    <a class="tab" href="screen-1.html"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="4" width="18" height="14" rx="2"/><path d="M3 18h18"/></svg><span class="tlabel">캔버스</span></a>
    <a class="tab" href="screen-2.html"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg><span class="tlabel">에셋</span></a>
    <a class="tab" href="screen-3.html"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M4 6h16M4 12h10M4 18h7"/></svg><span class="tlabel">속성</span></a>
    <a class="tab" href="screen-4.html"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 3v12m0 0-4-4m4 4 4-4M5 21h14"/></svg><span class="tlabel">내보내기</span></a>
    <a class="tab" href="screen-5.html" aria-current="page"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="3"/><path d="M19 12a7 7 0 0 0-.1-1.2l2-1.5-2-3.4-2.3 1a7 7 0 0 0-2-1.2l-.3-2.5H8.7l-.3 2.5a7 7 0 0 0-2 1.2l-2.3-1-2 3.4 2 1.5A7 7 0 0 0 4 12c0 .4 0 .8.1 1.2l-2 1.5 2 3.4 2.3-1a7 7 0 0 0 2 1.2l.3 2.5h4.6l.3-2.5a7 7 0 0 0 2-1.2l2.3 1 2-3.4-2-1.5c.1-.4.1-.8.1-1.2z"/></svg><span class="tlabel">설정</span></a>
  </nav>

  <div class="toast" id="toast" role="status" aria-live="polite">
    <span class="ico" aria-hidden="true"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg></span>
    <span class="toast-msg"></span>
  </div>

</div>
</body>
</html>
