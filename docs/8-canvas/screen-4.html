<!DOCTYPE html>
<html lang="ko" data-preset="8" data-variants="a,b" data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>상점 — 상품 추가 · Canvas 데모</title>
<link rel="stylesheet" href="tokens.css">
<link rel="stylesheet" href="app.css">
<style>
/* screen-4 상품 등록 폼 (§9) — 2열(2:1) 카드 그룹 + 스티키 저장 바 */
.price-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: var(--space-4); }
.chip-input-row { display: flex; flex-wrap: wrap; gap: var(--space-2); margin-top: var(--space-3); }
</style>
<script src="../assets/preset-loader.js" defer></script>
<script src="app.js" defer></script>
</head>
<body>

<header class="topbar">
  <span class="topbar-wordmark"><span class="topbar-mark" aria-hidden="true">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M4 9h16l-1 3H5z"/><path d="M5 12v7h14v-7"/><path d="M4 9l1.5-4h13L20 9"/></svg>
  </span>상점</span>
  <label class="topbar-search">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="11" cy="11" r="7"/><path d="m20 20-3-3"/></svg>
    <input type="search" placeholder="주문·상품·고객 검색" aria-label="검색">
  </label>
  <span class="topbar-spacer"></span>
  <div class="topbar-actions">
    <button class="icon-btn" type="button" aria-label="알림" data-toast="아직 새 알림이 없어요">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 4a5 5 0 0 0-5 5c0 4-1.5 5.5-2 6h14c-.5-.5-2-2-2-6a5 5 0 0 0-5-5z"/><path d="M10 20a2 2 0 0 0 4 0"/></svg>
    </button>
    <span class="avatar" aria-hidden="true">상</span>
  </div>
</header>

<aside class="sidebar" aria-label="주 메뉴">
  <div class="nav-group">
    <a class="nav-item" href="screen-1.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M4 11.5 12 5l8 6.5"/><path d="M6 10.5V19a1 1 0 0 0 1 1h10a1 1 0 0 0 1-1v-8.5"/></svg>
      <span>홈</span></a>
    <a class="nav-item" href="screen-2.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M6 3h12v18l-3-2-3 2-3-2-3 2z"/><path d="M9 8h6M9 12h6"/></svg>
      <span>주문</span></a>
    <a class="nav-item is-active" href="screen-4.html" aria-current="page">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M4 8l8-4 8 4v8l-8 4-8-4z"/><path d="M4 8l8 4 8-4M12 12v8"/></svg>
      <span>상품</span></a>
  </div>
  <div class="nav-group">
    <p class="nav-group-title t-micro">계정</p>
    <a class="nav-item" href="screen-5.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="3"/><path d="M19 12a7 7 0 0 0-.1-1.3l2-1.5-2-3.4-2.3.9a7 7 0 0 0-2.2-1.3L14 2h-4l-.4 2.4a7 7 0 0 0-2.2 1.3L5 4.8l-2 3.4 2 1.5A7 7 0 0 0 5 12c0 .4 0 .9.1 1.3l-2 1.5 2 3.4 2.3-.9a7 7 0 0 0 2.2 1.3L10 22h4l.4-2.4a7 7 0 0 0 2.2-1.3l2.3.9 2-3.4-2-1.5c.1-.4.1-.9.1-1.3z"/></svg>
      <span>설정</span></a>
  </div>
</aside>

<main class="content">
  <div class="content-inner">

    <div class="enter">
      <a class="page-back" href="screen-4.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="m15 6-6 6 6 6"/></svg>
        상품 목록</a>
      <div class="page-head" style="margin-bottom: var(--space-6);">
        <h1 class="t-title">상품 추가</h1>
      </div>
    </div>

    <form class="cols-2-1 enter-2" onsubmit="event.preventDefault(); sjToast('상품을 저장했어요');">
      <!-- 좌: 폼 카드 스택 -->
      <div class="stack">
        <div class="banner banner-warning">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M10.3 4.3 2.8 17a2 2 0 0 0 1.7 3h15a2 2 0 0 0 1.7-3L13.7 4.3a2 2 0 0 0-3.4 0z"/><path d="M12 9v4M12 17h.01"/></svg>
          <div><p class="banner-title">저장하기 전에 확인해 주세요</p><p class="banner-body t-caption">상품명과 판매가는 필수 항목이에요</p></div>
        </div>

        <section class="card" aria-label="기본 정보">
          <div class="card-head"><h2 class="t-heading">기본 정보</h2></div>
          <div class="field">
            <label class="field-label" for="p-name">상품명 <span class="sub">· 필수</span></label>
            <input class="input is-error" id="p-name" type="text" placeholder="예: 면 헨리넥 반팔 티셔츠" aria-describedby="p-name-hint">
            <p class="field-hint is-error" id="p-name-hint">상품명을 입력해 주세요</p>
          </div>
          <div class="field">
            <label class="field-label" for="p-desc">설명 <span class="sub">· 선택</span></label>
            <textarea class="textarea" id="p-desc" placeholder="소재, 핏, 세탁 방법 등 구매에 도움이 되는 정보를 적어 주세요"></textarea>
          </div>
        </section>

        <section class="card" aria-label="미디어">
          <div class="card-head"><h2 class="t-heading">미디어</h2></div>
          <button class="dropzone" type="button" data-toast="이미지 업로드는 준비 중이에요">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="4" width="18" height="16" rx="2"/><path d="m3 15 4-4 4 4 3-3 4 4"/><circle cx="9" cy="9" r="1.5"/></svg>
            <p class="t-body w600" style="color: var(--color-text);">이미지를 끌어다 놓거나 눌러서 추가</p>
            <p class="t-caption">JPG·PNG · 최대 5MB · 최대 8장</p>
          </button>
        </section>

        <section class="card" aria-label="가격">
          <div class="card-head"><h2 class="t-heading">가격</h2></div>
          <div class="price-grid">
            <div class="field">
              <label class="field-label" for="p-price">판매가 <span class="sub">· 필수</span></label>
              <div class="input-affix"><span class="prefix">₩</span><input class="input num" id="p-price" type="text" inputmode="numeric" placeholder="24,000"></div>
            </div>
            <div class="field">
              <label class="field-label" for="p-sale">할인가 <span class="sub">· 선택</span></label>
              <div class="input-affix"><span class="prefix">₩</span><input class="input num" id="p-sale" type="text" inputmode="numeric" placeholder="19,900"></div>
            </div>
            <div class="field">
              <label class="field-label" for="p-cost">원가 <span class="sub">· 선택</span></label>
              <div class="input-affix"><span class="prefix">₩</span><input class="input num" id="p-cost" type="text" inputmode="numeric" placeholder="11,000"></div>
            </div>
          </div>
          <p class="field-hint">원가는 고객에게 보이지 않고, 마진 계산에만 쓰여요</p>
        </section>

        <section class="card" aria-label="재고">
          <div class="card-head"><h2 class="t-heading">재고</h2></div>
          <div class="price-grid">
            <div class="field">
              <label class="field-label" for="p-sku">SKU <span class="sub">· 선택</span></label>
              <input class="input" id="p-sku" type="text" placeholder="TSH-CHR-L">
            </div>
            <div class="field">
              <label class="field-label" for="p-qty">수량</label>
              <input class="input num" id="p-qty" type="text" inputmode="numeric" placeholder="120">
            </div>
          </div>
          <hr class="card-divider">
          <div class="setting-row">
            <div class="meta"><p class="name">재고 추적</p><p class="desc">수량이 0이 되면 자동으로 품절 처리돼요</p></div>
            <label class="toggle"><input type="checkbox" checked aria-label="재고 추적"><span class="toggle-track"></span><span class="toggle-knob"></span></label>
          </div>
        </section>
      </div>

      <!-- 우: 사이드 카드 -->
      <div class="stack">
        <section class="card" aria-label="상태">
          <div class="card-head"><h2 class="t-heading">상태</h2></div>
          <div class="field">
            <label class="field-label" for="p-status">판매 상태</label>
            <div class="select-wrap">
              <select class="select" id="p-status"><option>게시</option><option>초안</option></select>
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="m6 9 6 6 6-6"/></svg>
            </div>
          </div>
          <hr class="card-divider">
          <p class="field-label">판매 채널</p>
          <label class="check-row"><span class="checkbox"><input type="checkbox" checked aria-label="온라인 스토어"><span class="checkbox-box"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="m5 12 5 5 9-11"/></svg></span></span><span class="t-body">온라인 스토어</span></label>
          <label class="check-row"><span class="checkbox"><input type="checkbox" aria-label="인스타그램 숍"><span class="checkbox-box"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="m5 12 5 5 9-11"/></svg></span></span><span class="t-body">인스타그램 숍</span></label>
        </section>

        <section class="card" aria-label="분류">
          <div class="card-head"><h2 class="t-heading">분류</h2></div>
          <div class="field">
            <label class="field-label" for="p-cat">카테고리</label>
            <div class="select-wrap">
              <select class="select" id="p-cat"><option>의류 &gt; 상의</option><option>의류 &gt; 하의</option><option>잡화 &gt; 양말</option></select>
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="m6 9 6 6 6-6"/></svg>
            </div>
          </div>
          <div class="field">
            <label class="field-label" for="p-tag">태그</label>
            <input class="input" id="p-tag" type="text" placeholder="입력 후 Enter">
            <div class="chip-input-row">
              <span class="chip-input">여름<svg class="chip-remove" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true"><path d="M18 6 6 18M6 6l12 12"/></svg></span>
              <span class="chip-input">면 100%<svg class="chip-remove" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true"><path d="M18 6 6 18M6 6l12 12"/></svg></span>
              <span class="chip-input">신상<svg class="chip-remove" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true"><path d="M18 6 6 18M6 6l12 12"/></svg></span>
            </div>
          </div>
        </section>
      </div>
    </form>

    <div class="sticky-actions">
      <button class="btn btn-ghost" type="button" onclick="location.href='screen-4.html'">취소</button>
      <button class="btn btn-primary" type="button" data-toast="상품을 저장했어요">저장</button>
    </div>

  </div>
</main>

<nav class="tabbar" aria-label="주 메뉴">
  <a class="tab" href="screen-1.html">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M4 11.5 12 5l8 6.5"/><path d="M6 10.5V19a1 1 0 0 0 1 1h10a1 1 0 0 0 1-1v-8.5"/></svg>
    <span>홈</span></a>
  <a class="tab" href="screen-2.html">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M6 3h12v18l-3-2-3 2-3-2-3 2z"/><path d="M9 8h6M9 12h6"/></svg>
    <span>주문</span></a>
  <a class="tab is-active" href="screen-4.html" aria-current="page">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M4 8l8-4 8 4v8l-8 4-8-4z"/><path d="M4 8l8 4 8-4M12 12v8"/></svg>
    <span>상품</span></a>
  <a class="tab" href="screen-5.html">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="3"/><path d="M19 12a7 7 0 0 0-.1-1.3l2-1.5-2-3.4-2.3.9a7 7 0 0 0-2.2-1.3L14 2h-4l-.4 2.4a7 7 0 0 0-2.2 1.3L5 4.8l-2 3.4 2 1.5A7 7 0 0 0 5 12c0 .4 0 .9.1 1.3l-2 1.5 2 3.4 2.3-.9a7 7 0 0 0 2.2 1.3L10 22h4l.4-2.4a7 7 0 0 0 2.2-1.3l2.3.9 2-3.4-2-1.5c.1-.4.1-.9.1-1.3z"/></svg>
    <span>설정</span></a>
</nav>

</body>
</html>
