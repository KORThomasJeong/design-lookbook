<!DOCTYPE html>
<html lang="ko" data-preset="13" data-variants="a,b" data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>머물다 — 예약 요청 · Coral 데모</title>
<link rel="stylesheet" href="tokens.css">
<link rel="stylesheet" href="app.css">
<style>
/* screen-3 예약 폼 (§9) */
.summary { display: flex; gap: var(--space-4); align-items: center; }
.summary .sum-main { flex: 1; min-width: 0; }
.form-top { padding-top: var(--space-6); }
</style>
<script src="../assets/preset-loader.js" defer></script>
<script src="app.js" defer></script>
</head>
<body>
<div class="app">

  <header class="appbar">
    <a class="icon-btn" href="screen-2.html" aria-label="뒤로">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="m15 6-6 6 6 6"/></svg>
    </a>
    <span class="appbar-title">예약 요청</span>
  </header>

  <main class="scroll scroll-pad-cta page-enter">

    <section class="form-top">
      <div class="box summary">
        <span class="thumb thumb-64" aria-hidden="true">
          <svg class="ph" viewBox="0 0 100 100" preserveAspectRatio="xMidYMid slice" style="color:var(--color-primary-vivid);position:absolute;inset:0;width:100%;height:100%" aria-hidden="true"><rect width="100" height="100" fill="var(--color-surface)"/><circle cx="77" cy="23" r="11" fill="currentColor" opacity="0.85"/><path d="M8 60 L50 38 L92 60 Z" fill="currentColor" opacity="0.28"/><rect x="20" y="60" width="60" height="28" fill="currentColor" opacity="0.5"/></svg>
        </span>
        <div class="sum-main">
          <p class="stay-title ellip">북촌 한옥 스테이</p>
          <p class="rating num" style="margin-top:var(--space-1)"><svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M12 2l2.9 6.3 6.9.7-5.1 4.6 1.4 6.8L12 17.6 5.9 20.4l1.4-6.8L2.2 9l6.9-.7z"/></svg>4.92 · 후기 128</p>
        </div>
      </div>
    </section>

    <section class="section">
      <div id="date-item">
        <button class="list-item" type="button" onclick="mSheet.open('date')" aria-label="여행 날짜 선택">
          <svg class="li-ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="4" y="5" width="16" height="16" rx="2"/><path d="M4 9h16M8 3v4M16 3v4"/></svg>
          <div class="li-main">
            <p class="li-title">여행 날짜</p>
            <p class="li-sub" id="date-val">체크인 7월 24일 – 체크아웃 7월 27일</p>
          </div>
          <svg class="li-chev" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="m9 6 6 6-6 6"/></svg>
        </button>
        <p class="helper-error" id="date-error" hidden>여행 날짜를 먼저 골라주세요</p>
      </div>

      <button class="list-item" type="button" onclick="mSheet.open('guest')" aria-label="게스트 수 선택">
        <svg class="li-ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="9" cy="8" r="3.2"/><path d="M3 20c0-3.2 2.7-5 6-5s6 1.8 6 5"/><path d="M16 6.5a3 3 0 0 1 0 5.5M18 20c0-2.5-1-4-3-4.6"/></svg>
        <div class="li-main">
          <p class="li-title">게스트</p>
          <p class="li-sub" id="guest-val">성인 2명</p>
        </div>
        <svg class="li-chev" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="m9 6 6 6-6 6"/></svg>
      </button>
    </section>

    <hr class="divider">

    <section>
      <h2 class="t-title-3" style="margin-bottom:var(--space-2)">요금 상세</h2>
      <div class="fee-row"><span class="fee-label">₩128,000 × 3박</span><span class="fee-amt num">₩384,000</span></div>
      <div class="fee-row"><span class="fee-label">청소비</span><span class="fee-amt num">₩30,000</span></div>
      <div class="fee-row"><span class="fee-label">머물다 서비스 수수료</span><span class="fee-amt num">₩46,000</span></div>
      <hr class="divider" style="margin:var(--space-2) 0">
      <div class="fee-row total"><span class="fee-label">총액 (원)</span><span class="fee-amt num">₩460,000</span></div>
      <p class="note">예약 확정 전까지는 요금이 청구되지 않아요.</p>
    </section>

  </main>

  <div class="cta-bar">
    <a class="btn btn-primary" href="screen-4.html">예약 요청하기</a>
  </div>

  <!-- 날짜 바텀시트 -->
  <div class="dim" id="date-dim" onclick="mSheet.close('date')"></div>
  <div class="sheet" id="date" role="dialog" aria-modal="true" aria-label="여행 날짜" data-open="false">
    <div class="sheet-grab" aria-hidden="true"></div>
    <h2 class="sheet-head">여행 날짜를 골라주세요</h2>
    <p class="t-caption sub" style="margin-bottom:var(--space-4)">2026년 7월</p>
    <div class="cal" role="grid" aria-label="7월 달력">
      <span class="dow">일</span><span class="dow">월</span><span class="dow">화</span><span class="dow">수</span><span class="dow">목</span><span class="dow">금</span><span class="dow">토</span>
      <span class="day muted">20</span><span class="day muted">21</span><span class="day muted">22</span><span class="day">23</span><span class="day edge">24</span><span class="day in-range">25</span><span class="day in-range">26</span>
      <span class="day edge">27</span><span class="day">28</span><span class="day">29</span><span class="day">30</span><span class="day">31</span><span class="day muted">1</span><span class="day muted">2</span>
    </div>
    <div class="sheet-actions">
      <button class="btn btn-secondary" type="button" onclick="mSheet.close('date')">닫기</button>
      <button class="btn btn-primary" type="button" onclick="mSheet.close('date')">이 날짜로 할게요</button>
    </div>
  </div>

  <!-- 게스트 바텀시트 -->
  <div class="dim" id="guest-dim" onclick="mSheet.close('guest')"></div>
  <div class="sheet" id="guest" role="dialog" aria-modal="true" aria-label="게스트 수" data-open="false">
    <div class="sheet-grab" aria-hidden="true"></div>
    <h2 class="sheet-head">몇 분이 머무시나요?</h2>
    <div class="list-item" style="padding-top:0">
      <div class="li-main">
        <p class="li-title">성인</p>
        <p class="li-sub">만 13세 이상</p>
      </div>
      <div class="stepper" aria-label="성인 수">
        <button type="button" aria-label="한 명 줄이기" onclick="mGuest(-1)">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" aria-hidden="true"><path d="M5 12h14"/></svg>
        </button>
        <span class="count" id="guest-count">2</span>
        <button type="button" aria-label="한 명 늘리기" onclick="mGuest(1)">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" aria-hidden="true"><path d="M12 5v14M5 12h14"/></svg>
        </button>
      </div>
    </div>
    <div class="sheet-actions">
      <button class="btn btn-primary" type="button" onclick="mSheet.close('guest')">완료</button>
    </div>
  </div>

</div>

<script>
  var guestN = 2;
  window.mGuest = function (d) {
    guestN = Math.max(1, Math.min(8, guestN + d));
    document.getElementById('guest-count').textContent = guestN;
    document.getElementById('guest-val').textContent = '성인 ' + guestN + '명';
  };
</script>
</body>
</html>
