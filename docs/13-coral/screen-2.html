<!DOCTYPE html>
<html lang="ko" data-preset="13" data-variants="a,b" data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>머물다 — 숙소 상세 · Coral 데모</title>
<link rel="stylesheet" href="tokens.css">
<link rel="stylesheet" href="app.css">
<style>
/* screen-2 숙소 상세 (§9) */
.hero { position: relative; width: 100%; aspect-ratio: 4 / 3; background: var(--color-surface); overflow: hidden; }
.hero .ph { position: absolute; inset: 0; width: 100%; height: 100%; }
.hero-top {
  position: absolute; top: 0; left: 0; right: 0; z-index: 5;
  display: flex; align-items: center;
  padding: var(--space-3) var(--space-3);
  padding-top: calc(var(--space-3) + env(safe-area-inset-top));
}
.hero-top .spacer { flex: 1; }
.hero-top .grp { display: flex; gap: var(--space-2); }
.pad { padding: 0 var(--layout-screen-padding); }
.detail-top { padding-top: var(--space-6); }
.host-row { display: flex; align-items: center; gap: var(--space-3); }
.host-row .host-main { flex: 1; min-width: 0; }
.map { height: 160px; border-radius: var(--radius-lg); background: var(--color-surface); position: relative; overflow: hidden; }
</style>
<script src="../assets/preset-loader.js" defer></script>
<script src="app.js" defer></script>
</head>
<body>
<div class="app">

  <main class="scroll scroll-flush scroll-pad-cta page-enter">

    <div class="hero">
      <svg class="ph" viewBox="0 0 100 75" preserveAspectRatio="xMidYMid slice" style="color:var(--color-primary-vivid)" aria-hidden="true"><rect width="100" height="75" fill="var(--color-surface)"/><circle cx="80" cy="16" r="9" fill="currentColor" opacity="0.8"/><path d="M6 46 L50 24 L94 46 Z" fill="currentColor" opacity="0.26"/><rect x="18" y="46" width="64" height="24" fill="currentColor" opacity="0.5"/><rect x="30" y="52" width="12" height="18" fill="var(--color-surface)"/><rect x="58" y="52" width="12" height="18" fill="var(--color-surface)"/><path d="M0 70 H100 V75 H0 Z" fill="currentColor" opacity="0.32"/></svg>
      <div class="hero-top">
        <a class="icon-float" href="screen-1.html" aria-label="뒤로">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="m15 6-6 6 6 6"/></svg>
        </a>
        <span class="spacer"></span>
        <div class="grp">
          <button class="icon-float" type="button" aria-label="공유" onclick="mToast('링크를 복사했어요')">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 15V4M8 8l4-4 4 4"/><path d="M5 12v6a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1v-6"/></svg>
          </button>
          <button class="icon-float heart" type="button" aria-label="위시리스트에 저장" aria-pressed="false" style="position:static;color:var(--color-text)">
            <svg width="22" height="22" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path class="heart-fill" d="M12 20s-7-4.5-9.5-9C1 8 2.5 4.5 6 4.5c2 0 3.2 1.2 4 2.3.8-1.1 2-2.3 4-2.3 3.5 0 5 3.5 3.5 6.5C19 15.5 12 20 12 20z"/></svg>
          </button>
        </div>
      </div>
    </div>

    <div class="pad detail-top">
      <h1 class="t-title-2">북촌 한옥 스테이</h1>
      <p class="t-body-2 sub" style="margin-top:var(--space-1)">서울 종로구 · 한옥 전체</p>
      <p class="rating num" style="margin-top:var(--space-2)"><svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M12 2l2.9 6.3 6.9.7-5.1 4.6 1.4 6.8L12 17.6 5.9 20.4l1.4-6.8L2.2 9l6.9-.7z"/></svg>4.92 · 후기 128개</p>

      <hr class="divider">

      <div class="host-row">
        <span class="avatar avatar-48" aria-hidden="true">지</span>
        <div class="host-main">
          <p class="t-body-1 w500">호스트 지원님</p>
          <p class="t-caption sub" style="margin-top:var(--space-1)">슈퍼호스트 · 호스팅 4년째</p>
        </div>
        <span class="badge badge-super">슈퍼호스트</span>
      </div>

      <hr class="divider">

      <h2 class="t-title-3" style="margin-bottom:var(--space-2)">이 숙소의 편의시설</h2>
      <div>
        <div class="list-item">
          <svg class="li-ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M2 8.8a15 15 0 0 1 20 0M5 12.2a10 10 0 0 1 14 0M8.5 15.6a5 5 0 0 1 7 0"/><circle cx="12" cy="19" r="1" fill="currentColor" stroke="none"/></svg>
          <div class="li-main"><p class="li-title">초고속 와이파이</p></div>
        </div>
        <div class="list-item">
          <svg class="li-ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="4" y="5" width="16" height="14" rx="2"/><path d="M9 15V9h3.5a2.5 2.5 0 0 1 0 5H9"/></svg>
          <div class="li-main"><p class="li-title">무료 주차 공간</p></div>
        </div>
        <div class="list-item">
          <svg class="li-ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M5 3v7a3 3 0 0 0 3 3 3 3 0 0 0 3-3V3M8 3v6M17 3c-1.5 0-2.5 2-2.5 5s1 4 2.5 4"/><path d="M8 13v8M17 12v9"/></svg>
          <div class="li-main"><p class="li-title">취사 가능한 주방</p></div>
        </div>
      </div>

      <hr class="divider">

      <h2 class="t-title-3" style="margin-bottom:var(--space-2)">이 집은</h2>
      <p class="t-body-1">경복궁과 북촌 한옥마을 사이, 조용한 골목 끝의 단독 한옥이에요. 마당에 앉아 처마 선을 바라보면 도심 한복판이라는 게 믿기지 않아요. 두 분이 머물기 딱 좋은 크기예요.</p>
      <a class="btn btn-ghost" href="screen-2.html" style="width:auto;justify-content:flex-start;padding:0;margin-top:var(--space-2)">더 보기</a>

      <hr class="divider">

      <h2 class="t-title-3" style="margin-bottom:var(--space-4)">위치</h2>
      <div class="map">
        <svg class="ph" viewBox="0 0 100 40" preserveAspectRatio="xMidYMid slice" style="color:var(--color-accent);position:absolute;inset:0;width:100%;height:100%" aria-hidden="true"><rect width="100" height="40" fill="var(--color-surface)"/><path d="M0 26 H100 M40 0 V40 M0 12 H100" stroke="currentColor" stroke-width="1" opacity="0.35"/><circle cx="42" cy="20" r="4" fill="var(--color-primary-vivid)"/></svg>
      </div>
      <p class="t-caption sub" style="margin-top:var(--space-2)">서울 종로구 가회동 일대</p>
    </div>

  </main>

  <div class="cta-bar">
    <div class="cta-price">
      <p class="price num">₩128,000<span class="per"> /박</span></p>
      <p class="rating num" style="margin-top:var(--space-1)"><svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M12 2l2.9 6.3 6.9.7-5.1 4.6 1.4 6.8L12 17.6 5.9 20.4l1.4-6.8L2.2 9l6.9-.7z"/></svg>4.92 · 후기 128</p>
    </div>
    <a class="btn btn-primary" href="screen-3.html">예약하기</a>
  </div>

</div>
</body>
</html>
