<!DOCTYPE html>
<html lang="ko" data-preset="3" data-variants="a,b" data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>지갑 — 소비 내역 · Jelly 데모</title>
<link rel="stylesheet" href="tokens.css">
<link rel="stylesheet" href="app.css">
<style>
/* screen-4 소비 내역 (§9) — 월 요약 + 일별 리스트 (테이블 금지 §10-J1) */
.months { padding-top: var(--space-4); }
.total-card { margin-top: var(--space-6); }
.total-amt { margin-top: var(--space-2); }
.total-delta { margin-top: var(--space-1); }
.day-group { margin-top: var(--space-6); }
.day-group:first-of-type { margin-top: var(--space-7); }
.day-head { margin-bottom: var(--space-2); }
</style>
<script src="../assets/preset-loader.js" defer></script>
<script src="app.js" defer></script>
</head>
<body>
<div class="app">

  <header class="appbar">
    <span class="appbar-wordmark">소비</span>
    <span class="appbar-spacer"></span>
  </header>

  <main class="scroll scroll-pad-tab page-enter">
    <div class="chip-row months" role="group" aria-label="월 선택">
      <button class="chip" type="button">4월</button>
      <button class="chip" type="button">5월</button>
      <button class="chip" type="button">6월</button>
      <button class="chip selected" type="button" aria-pressed="true">7월</button>
    </div>

    <div class="card total-card">
      <p class="t-caption sub">7월에 쓴 돈</p>
      <p class="t-display2 num total-amt">842,000원</p>
      <p class="t-caption pos w600 total-delta">지난달보다 68,000원 덜 썼어요</p>
    </div>

    <section class="day-group" aria-label="7월 10일">
      <p class="t-caption sub day-head">7월 10일 목요일</p>
      <ul class="stagger">
        <li><button class="row" type="button">
          <span class="ico-circle" aria-hidden="true"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M5 9h11v4a5 5 0 0 1-5 5h-1a5 5 0 0 1-5-5z"/><path d="M16 10h2a2 2 0 0 1 0 4h-2"/><path d="M8 3v2M11 3v2"/></svg></span>
          <span class="row-main"><span class="row-title">스타벅스 강남점</span><span class="row-sub">카페</span></span>
          <span class="row-amt num">5,800원</span></button></li>
        <li><button class="row" type="button">
          <span class="ico-circle" aria-hidden="true"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12h16a8 8 0 0 1-16 0z"/><path d="M5 12a7 7 0 0 1 14 0"/><path d="M12 3v3"/></svg></span>
          <span class="row-main"><span class="row-title">배달의민족</span><span class="row-sub">배달</span></span>
          <span class="row-amt num">23,000원</span></button></li>
      </ul>
    </section>

    <section class="day-group" aria-label="7월 9일">
      <p class="t-caption sub day-head">7월 9일 수요일</p>
      <ul class="stagger">
        <li><button class="row" type="button">
          <span class="ico-circle" style="background: var(--color-success-soft); color: var(--color-success)" aria-hidden="true"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v11"/><path d="M7 11l5 5 5-5"/></svg></span>
          <span class="row-main"><span class="row-title">이서연님이 보냄</span><span class="row-sub">입금</span></span>
          <span class="row-amt num pos">+30,000원</span></button></li>
        <li><button class="row" type="button">
          <span class="ico-circle" aria-hidden="true"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 5h2l1.5 10h9L18 8H7"/><circle cx="9" cy="19" r="1.3"/><circle cx="16" cy="19" r="1.3"/></svg></span>
          <span class="row-main"><span class="row-title">GS25 역삼점</span><span class="row-sub">편의점</span></span>
          <span class="row-amt num">4,500원</span></button></li>
        <li><button class="row" type="button">
          <span class="ico-circle" aria-hidden="true"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="12" rx="2"/><path d="M8 21h8"/><path d="M11 9.5l3 1.5-3 1.5z"/></svg></span>
          <span class="row-main"><span class="row-title">넷플릭스</span><span class="row-sub">구독</span></span>
          <span class="row-amt num">13,500원</span></button></li>
      </ul>
    </section>

    <section class="day-group" aria-label="7월 8일">
      <p class="t-caption sub day-head">7월 8일 화요일</p>
      <ul class="stagger">
        <li><button class="row" type="button">
          <span class="ico-circle" aria-hidden="true"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12l2-5h12l2 5"/><rect x="3" y="12" width="18" height="5" rx="1"/><circle cx="7.5" cy="17" r="1.3"/><circle cx="16.5" cy="17" r="1.3"/></svg></span>
          <span class="row-main"><span class="row-title">카카오 T</span><span class="row-sub">택시</span></span>
          <span class="row-amt num">12,700원</span></button></li>
        <li><button class="row" type="button">
          <span class="ico-circle" aria-hidden="true"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M6 8h12l-1 12H7z"/><path d="M9 8a3 3 0 0 1 6 0"/></svg></span>
          <span class="row-main"><span class="row-title">올리브영</span><span class="row-sub">쇼핑</span></span>
          <span class="row-amt num">38,900원</span></button></li>
        <li><button class="row" type="button">
          <span class="ico-circle" aria-hidden="true"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M7 3v7M5 3v4a2 2 0 0 0 4 0V3M7 10v11"/><path d="M16 3c-1.5 0-2.5 2-2.5 5s1 4 2.5 4v9"/></svg></span>
          <span class="row-main"><span class="row-title">김밥천국</span><span class="row-sub">외식</span></span>
          <span class="row-amt num">8,000원</span></button></li>
      </ul>
    </section>
  </main>

  <nav class="tabbar" aria-label="주 메뉴">
    <a class="tab" href="screen-1.html">
      <svg class="tab-ico" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M4 11.5 12 5l8 6.5"/><path d="M6 10.5V19a1 1 0 0 0 1 1h10a1 1 0 0 0 1-1v-8.5"/></svg>
      <span class="tab-label">홈</span></a>
    <a class="tab" href="screen-2.html">
      <svg class="tab-ico" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M7 8h10l-3-3"/><path d="M17 16H7l3 3"/></svg>
      <span class="tab-label">송금</span></a>
    <a class="tab" href="screen-4.html" aria-current="page">
      <svg class="tab-ico" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M6 4h12v16l-2.5-1.5L13 20l-2.5-1.5L8 20 6 18.5z"/><path d="M9 9h6M9 13h4"/></svg>
      <span class="tab-label">내역</span></a>
    <a class="tab" href="screen-5.html">
      <svg class="tab-ico" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="4" y="4" width="6" height="6" rx="1.5"/><rect x="14" y="4" width="6" height="6" rx="1.5"/><rect x="4" y="14" width="6" height="6" rx="1.5"/><rect x="14" y="14" width="6" height="6" rx="1.5"/></svg>
      <span class="tab-label">전체</span></a>
  </nav>

</div>
</body>
</html>
