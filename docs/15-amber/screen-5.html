<script>
/* 토글 상호작용 (설정 화면 전용) — aria-checked 반전, 다크 모드는 테마 전환 */
(function () {
  var html = document.documentElement;
  function reflectThemeToggle() {
    var t = document.querySelector('[data-theme-toggle]');
    if (t) t.setAttribute('aria-checked', html.getAttribute('data-theme') === 'dark' ? 'true' : 'false');
  }
  reflectThemeToggle();
  document.querySelectorAll('.switch').forEach(function (sw) {
    function toggle() {
      var on = sw.getAttribute('aria-checked') !== 'true';
      sw.setAttribute('aria-checked', on ? 'true' : 'false');
      if (sw.hasAttribute('data-theme-toggle')) {
        html.setAttribute('data-theme', on ? 'dark' : 'light');
      }
    }
    sw.addEventListener('click', function (e) { e.preventDefault(); toggle(); });
    sw.addEventListener('keydown', function (e) {
      if (e.key === ' ' || e.key === 'Enter') { e.preventDefault(); toggle(); }
    });
  });
})();
</script>
