<!DOCTYPE html>
<html lang="ko" data-preset="15" data-variants="a,b" data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>톡톡 — 프로필 · Amber 데모</title>
<link rel="stylesheet" href="tokens.css">
<link rel="stylesheet" href="app.css">
<style>
/* screen-3 프로필 (§9) — 커버 + 80px 둥근사각 아바타 + 액션 3개 */
.prof-appbar { position: absolute; top: 0; left: 0; right: 0; background: transparent; }
.prof-scroll { padding: 0; }
.info-card { margin: var(--space-6) var(--layout-screen-padding) 0; }
</style>
<script src="../assets/preset-loader.js" defer></script>
<script src="app.js" defer></script>
</head>
<body>
<div class="app">

  <main class="scroll scroll-pad-tab page-enter prof-scroll">
    <header class="appbar prof-appbar">
      <a class="icon-btn" href="screen-1.html" aria-label="뒤로">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="m15 5-7 7 7 7"/></svg>
      </a>
      <span class="appbar-spacer"></span>
      <button class="icon-btn" type="button" aria-label="더보기" onclick="tkToast('프로필 메뉴를 열어요')">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="5" r="1.4"/><circle cx="12" cy="12" r="1.4"/><circle cx="12" cy="19" r="1.4"/></svg>
      </button>
    </header>

    <section class="cover" aria-label="프로필 커버">
      <span class="avatar avatar-80" aria-hidden="true">서</span>
    </section>

    <div class="profile-body">
      <h1 class="t-display2 profile-name">김서연</h1>
      <p class="t-body2 sub profile-status">오늘도 좋은 하루 보내세요 ☀️</p>

      <div class="action-row" role="group" aria-label="프로필 액션">
        <a class="action-btn primary" href="screen-2.html">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 12a8 8 0 0 1-11.3 7.3L4 21l1.7-5.7A8 8 0 1 1 21 12z"/></svg>
          1:1 채팅
        </a>
        <button class="action-btn" type="button" onclick="tkToast('통화를 걸어요')">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M6 3h3l1.5 5-2 1.5a11 11 0 0 0 5 5l1.5-2 5 1.5v3a2 2 0 0 1-2.2 2A16 16 0 0 1 4 5.2 2 2 0 0 1 6 3z"/></svg>
          통화
        </button>
        <button class="action-btn" type="button" onclick="tkToast('친구를 편집해요')">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 20h9"/><path d="M16.5 3.5a2 2 0 0 1 3 3L7 19l-4 1 1-4z"/></svg>
          편집
        </button>
      </div>
    </div>

    <section class="card info-card" aria-label="상세 정보">
      <div class="info-list">
        <div class="info-row"><span class="info-label">생일</span><span class="info-value num">5월 12일</span></div>
        <div class="info-row"><span class="info-label">이메일</span><span class="info-value ellip">seoyeon.kim@example.com</span></div>
        <div class="info-row"><span class="info-label">전화</span><span class="info-value num">010-2345-6789</span></div>
        <div class="info-row"><span class="info-label">함께한 날</span><span class="info-value num">428일</span></div>
      </div>
    </section>

    <section class="section" style="padding: 0 var(--layout-screen-padding)">
      <a class="btn btn-secondary" href="screen-5.html">내 프로필 편집</a>
    </section>
  </main>

  <nav class="tabbar" aria-label="주 메뉴">
    <a class="tab" href="screen-1.html">
      <span class="tab-ico-wrap"><svg class="tab-ico" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 12a8 8 0 0 1-11.3 7.3L4 21l1.7-5.7A8 8 0 1 1 21 12z"/></svg><span class="tab-dot" aria-hidden="true"></span></span>
      <span class="tab-label">채팅</span></a>
    <a class="tab" href="screen-3.html" aria-current="page">
      <svg class="tab-ico" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="8" r="4"/><path d="M4 20a8 8 0 0 1 16 0"/></svg>
      <span class="tab-label">친구</span></a>
    <a class="tab" href="screen-4.html">
      <svg class="tab-ico" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="4" y="4" width="6" height="6" rx="2"/><rect x="14" y="4" width="6" height="6" rx="2"/><rect x="4" y="14" width="6" height="6" rx="2"/><rect x="14" y="14" width="6" height="6" rx="2"/></svg>
      <span class="tab-label">더보기</span></a>
    <a class="tab" href="screen-5.html">
      <svg class="tab-ico" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="3"/><path d="M19.4 13a1.7 1.7 0 0 0 .3 1.9l.1.1a2 2 0 1 1-2.8 2.8l-.1-.1a1.7 1.7 0 0 0-2.9 1.2v.1a2 2 0 1 1-4 0v-.2a1.7 1.7 0 0 0-2.9-1.1l-.1.1a2 2 0 1 1-2.8-2.8l.1-.1A1.7 1.7 0 0 0 4.6 13a1.7 1.7 0 0 0-1.5-1H3a2 2 0 1 1 0-4h.2A1.7 1.7 0 0 0 4.6 6.4l-.1-.1a2 2 0 1 1 2.8-2.8l.1.1a1.7 1.7 0 0 0 2.9-.3 1.7 1.7 0 0 0 .1-.7V3a2 2 0 1 1 4 0v.2a1.7 1.7 0 0 0 2.9 1.2l.1-.1a2 2 0 1 1 2.8 2.8l-.1.1a1.7 1.7 0 0 0-.3 1.9 1.7 1.7 0 0 0 1.5 1h.1a2 2 0 1 1 0 4h-.2a1.7 1.7 0 0 0-1.5 1z"/></svg>
      <span class="tab-label">설정</span></a>
  </nav>

</div>
</body>
</html>
