<!DOCTYPE html>
<html lang="ko" data-preset="6" data-variants="a,b" data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>링 — 요약 · Glass 데모</title>
<link rel="stylesheet" href="tokens.css">
<link rel="stylesheet" href="app.css">
<script src="../assets/preset-loader.js" defer></script>
<script src="app.js" defer></script>
</head>
<body>
<div class="frame">

  <header class="nav" aria-label="상단 바">
    <span class="nav-slot"></span>
    <span class="nav-title t-headline">요약</span>
    <span class="nav-slot right">
      <a class="avatar avatar-sm" href="screen-2.html" aria-label="내 프로필">김</a>
    </span>
  </header>

  <main class="scroll" id="scroll">
    <div class="large-title">
      <h1 class="t-large-title">요약</h1>
      <p class="t-subhead c-sub mt-2">7월 10일 목요일</p>
    </div>

    <!-- 활동 링 카드 -->
    <section class="group-first" aria-label="오늘의 활동">
      <div class="card ring-card enter">
        <div class="ring-wrap" role="img" aria-label="이동 90퍼센트, 운동 71퍼센트, 서기 83퍼센트">
          <svg width="120" height="120" viewBox="0 0 120 120" aria-hidden="true">
            <g transform="rotate(-90 60 60)" fill="none" stroke-linecap="round" stroke-width="11">
              <circle class="ring-track" cx="60" cy="60" r="52"/>
              <circle class="ring-arc" cx="60" cy="60" r="52" data-pct="90" stroke="var(--color-primary-vivid)"/>
              <circle class="ring-track" cx="60" cy="60" r="39"/>
              <circle class="ring-arc" cx="60" cy="60" r="39" data-pct="71" stroke="var(--color-accent)"/>
              <circle class="ring-track" cx="60" cy="60" r="26"/>
              <circle class="ring-arc" cx="60" cy="60" r="26" data-pct="83" stroke="var(--color-success)"/>
            </g>
          </svg>
        </div>
        <div class="ring-stats">
          <div class="ring-stat">
            <span class="t-footnote c-sub">이동</span>
            <span class="t-title-3 num"><span data-count="540" data-from="0">540</span> / 600 kcal</span>
          </div>
          <div class="ring-stat">
            <span class="t-footnote c-sub">운동</span>
            <span class="t-title-3 num"><span data-count="32" data-from="0">32</span> / 45 분</span>
          </div>
          <div class="ring-stat">
            <span class="t-footnote c-sub">서기</span>
            <span class="t-title-3 num"><span data-count="10" data-from="0">10</span> / 12 시간</span>
          </div>
        </div>
      </div>
    </section>

    <!-- 추세 2열 지표 카드 -->
    <section class="group" aria-label="추세">
      <h2 class="group-header t-footnote">추세</h2>
      <div class="metrics stagger">
        <div class="card">
          <svg class="metric-icon" width="25" height="25" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M8 4l2 5-2 3 3 8"/><path d="M14 4l-1 6 3 3-1 7"/><circle cx="9" cy="3.5" r="1.2" fill="currentColor" stroke="none"/></svg>
          <div class="metric-value">
            <span class="t-title-1 num" data-count="8420" data-from="0">8,420</span>
            <span class="t-subhead c-sub">걸음</span>
          </div>
        </div>
        <div class="card">
          <svg class="metric-icon" width="25" height="25" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3 12h4l2-5 3 10 2-5h4"/></svg>
          <div class="metric-value">
            <span class="t-title-1 num" data-count="72" data-from="0">72</span>
            <span class="t-subhead c-sub">bpm</span>
          </div>
        </div>
      </div>
    </section>

    <!-- 오늘의 하이라이트 inset grouped 리스트 -->
    <section class="group" aria-label="오늘의 하이라이트">
      <h2 class="group-header t-footnote">오늘의 하이라이트</h2>
      <div class="list stagger">
        <a class="cell cell--icon" href="screen-4.html">
          <span class="cell-icon tint-primary" aria-hidden="true">
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="13" cy="4" r="1.6" fill="currentColor" stroke="none"/><path d="M6 21l3-6 3 2 1-4-4-3 4-2 3 4h3"/></svg>
          </span>
          <span class="cell-main"><span class="t-body">아침 러닝</span><span class="t-subhead sub">한강공원 · 5.2 km · 28분</span></span>
          <span class="cell-trail">
            <span class="cell-value num">오전 7:10</span>
            <svg class="chevron" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M9 6l6 6-6 6"/></svg>
          </span>
        </a>
        <a class="cell cell--icon" href="screen-3.html">
          <span class="cell-icon tint-danger" aria-hidden="true">
            <svg width="17" height="17" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M12 20s-7-4.35-7-9.5A3.5 3.5 0 0 1 12 8a3.5 3.5 0 0 1 7 2.5C19 15.65 12 20 12 20z"/></svg>
          </span>
          <span class="cell-main"><span class="t-body">심박 안정</span><span class="t-subhead sub">어제보다 4 bpm 낮아요</span></span>
          <svg class="chevron" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M9 6l6 6-6 6"/></svg>
        </a>
        <a class="cell cell--icon" href="screen-5.html">
          <span class="cell-icon tint-accent" aria-hidden="true">
            <svg width="17" height="17" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M20 14.5A7.5 7.5 0 0 1 9.5 4 7.5 7.5 0 1 0 20 14.5z"/></svg>
          </span>
          <span class="cell-main"><span class="t-body">수면 기록</span><span class="t-subhead sub">어젯밤 7시간 12분</span></span>
          <svg class="chevron" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M9 6l6 6-6 6"/></svg>
        </a>
      </div>
    </section>

    <div class="tail"></div>
  </main>

  <nav class="tabbar" aria-label="주 메뉴">
    <a class="tab" href="screen-1.html" aria-current="page">
      <svg width="25" height="25" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true"><circle cx="12" cy="12" r="8.5"/><circle cx="12" cy="12" r="4"/></svg>
      <span>요약</span></a>
    <a class="tab" href="screen-4.html">
      <svg width="25" height="25" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3 12h3l2-6 4 14 3-9 2 3h3"/></svg>
      <span>운동</span></a>
    <a class="tab" href="screen-2.html">
      <svg width="25" height="25" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="3"/><path d="M12 3v2M12 19v2M4.2 4.2l1.4 1.4M18.4 18.4l1.4 1.4M3 12h2M19 12h2M4.2 19.8l1.4-1.4M18.4 5.6l1.4-1.4"/></svg>
      <span>설정</span></a>
    <a class="tab" href="screen-5.html">
      <svg width="25" height="25" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M6 9a6 6 0 0 1 12 0c0 5 2 6 2 6H4s2-1 2-6z"/><path d="M10 20a2 2 0 0 0 4 0"/></svg>
      <span>알림</span></a>
  </nav>

</div>
</body>
</html>
