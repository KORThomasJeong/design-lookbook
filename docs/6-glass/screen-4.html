<!DOCTYPE html>
<html lang="ko" data-preset="6" data-variants="a,b" data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>링 — 운동 · Glass 데모</title>
<link rel="stylesheet" href="tokens.css">
<link rel="stylesheet" href="app.css">
<script src="../assets/preset-loader.js" defer></script>
<script src="app.js" defer></script>
</head>
<body>
<div class="frame">

  <header class="nav" aria-label="상단 바">
    <span class="nav-slot"></span>
    <span class="nav-title t-headline">운동</span>
    <span class="nav-slot right">
      <button class="btn-plain" type="button" onclick="gSheet.open('add')" aria-label="새 운동 추가">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true"><path d="M12 5v14M5 12h14"/></svg>
      </button>
    </span>
  </header>

  <main class="scroll scale-back" id="scroll">
    <div class="large-title">
      <h1 class="t-large-title">운동</h1>
      <p class="t-subhead c-sub mt-2">이번 주 4회 · 172분</p>
    </div>

    <section class="group-first" aria-label="최근 운동">
      <h2 class="group-header t-footnote">최근</h2>
      <div class="list stagger">
        <div class="cell cell--icon is-static">
          <span class="cell-icon tint-primary" aria-hidden="true"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="13" cy="4" r="1.6" fill="currentColor" stroke="none"/><path d="M6 21l3-6 3 2 1-4-4-3 4-2 3 4h3"/></svg></span>
          <span class="cell-main"><span class="t-body">아침 러닝</span><span class="t-subhead sub">한강공원 · 5.2 km · 28분</span></span>
          <span class="cell-trail">
            <span class="cell-value num">오전 7:10</span>
            <button type="button" aria-label="아침 러닝 삭제" onclick="gAlert.open('del')" style="background:transparent;border:0;cursor:pointer;color:var(--color-danger);padding:var(--space-1);min-height:var(--size-touch-min);display:inline-flex;align-items:center">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M5 7h14M9 7V5h6v2M6 7l1 13h10l1-13"/></svg>
            </button>
          </span>
        </div>
        <div class="cell cell--icon is-static">
          <span class="cell-icon tint-accent" aria-hidden="true"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="6" cy="17" r="3"/><circle cx="18" cy="17" r="3"/><path d="M6 17l4-7h4l3 7M10 10l-1-3h4"/></svg></span>
          <span class="cell-main"><span class="t-body">실내 자전거</span><span class="t-subhead sub">홈 트레이닝 · 12.4 km · 40분</span></span>
          <span class="cell-trail"><span class="cell-value">어제</span></span>
        </div>
        <div class="cell cell--icon is-static">
          <span class="cell-icon tint-success" aria-hidden="true"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 9v6M20 9v6M7 7v10M17 7v10M7 12h10"/></svg></span>
          <span class="cell-main"><span class="t-body">근력 운동</span><span class="t-subhead sub">상체 · 8세트 · 25분</span></span>
          <span class="cell-trail"><span class="cell-value">화요일</span></span>
        </div>
      </div>
      <p class="group-footer t-footnote">우측 위 더하기를 눌러 새 운동을 기록해 보세요.</p>
    </section>

    <div class="tail"></div>
  </main>

  <nav class="tabbar" aria-label="주 메뉴">
    <a class="tab" href="screen-1.html">
      <svg width="25" height="25" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true"><circle cx="12" cy="12" r="8.5"/><circle cx="12" cy="12" r="4"/></svg>
      <span>요약</span></a>
    <a class="tab" href="screen-4.html" aria-current="page">
      <svg width="25" height="25" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3 12h3l2-6 4 14 3-9 2 3h3"/></svg>
      <span>운동</span></a>
    <a class="tab" href="screen-2.html">
      <svg width="25" height="25" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="3"/><path d="M12 3v2M12 19v2M4.2 4.2l1.4 1.4M18.4 18.4l1.4 1.4M3 12h2M19 12h2M4.2 19.8l1.4-1.4M18.4 5.6l1.4-1.4"/></svg>
      <span>설정</span></a>
    <a class="tab" href="screen-5.html">
      <svg width="25" height="25" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M6 9a6 6 0 0 1 12 0c0 5 2 6 2 6H4s2-1 2-6z"/><path d="M10 20a2 2 0 0 0 4 0"/></svg>
      <span>알림</span></a>
  </nav>

  <!-- §6.7 바텀시트: 새 운동 -->
  <div class="dim" id="add-dim" onclick="gSheet.close('add')"></div>
  <section class="sheet" id="add" role="dialog" aria-modal="true" aria-label="새 운동">
    <div class="grabber" aria-hidden="true"></div>
    <div class="sheet-head">
      <button class="btn-plain regular" type="button" onclick="gSheet.close('add')">취소</button>
      <span class="title t-title-2">새 운동</span>
      <button class="btn-plain" type="button" onclick="gSheet.close('add'); gBanner('운동을 추가했어요')">추가</button>
    </div>

    <div class="big-input">
      <span class="value num t-title-1" id="dur">0</span>
      <span class="t-title-3 c-sub">분</span>
    </div>

    <div class="list">
      <button class="cell" type="button">
        <span class="cell-main"><span class="t-body">종류</span></span>
        <span class="cell-trail">
          <span class="cell-value">달리기</span>
          <svg class="chevron" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M9 6l6 6-6 6"/></svg>
        </span>
      </button>
      <div class="cell is-static" style="flex-direction: column; align-items: stretch; gap: var(--space-2)">
        <span class="t-body">강도</span>
        <div class="segment" data-segment role="tablist" aria-label="강도">
          <span class="segment-pill" aria-hidden="true"></span>
          <button class="segment-opt" type="button" role="tab">낮음</button>
          <button class="segment-opt is-active" type="button" role="tab">보통</button>
          <button class="segment-opt" type="button" role="tab">높음</button>
        </div>
      </div>
      <div class="cell is-static">
        <span class="cell-main"><span class="t-body">위치 사용</span></span>
        <button class="switch" type="button" role="switch" aria-checked="true" aria-label="위치 사용"><span class="switch-knob"></span></button>
      </div>
    </div>

    <button class="btn btn-primary btn-block" type="button" style="margin-top: var(--space-6)" onclick="gSheet.close('add'); gBanner('운동을 추가했어요')">저장</button>
  </section>

  <!-- §6.7 파괴적 알림 -->
  <div class="alert-scrim" id="del" onclick="if(event.target===this)gAlert.close('del')">
    <div class="alert" role="alertdialog" aria-modal="true" aria-labelledby="del-t" aria-describedby="del-m">
      <div class="alert-body">
        <span class="t-headline" id="del-t">이 운동을 삭제할까요?</span>
        <span class="t-footnote c-sub" id="del-m">되돌릴 수 없어요</span>
      </div>
      <div class="alert-actions">
        <button class="alert-btn cancel" type="button" onclick="gAlert.close('del')">취소</button>
        <button class="alert-btn danger" type="button" onclick="gAlert.close('del'); gBanner('운동을 삭제했어요')">삭제</button>
      </div>
    </div>
  </div>

</div>
<script>
  window.addEventListener('DOMContentLoaded', function () {
    setTimeout(function () { if (window.gSheet) gSheet.open('add'); }, 450);
  });
</script>
</body>
</html>
