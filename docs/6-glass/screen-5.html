<!DOCTYPE html>
<html lang="ko" data-preset="6" data-variants="a,b" data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>링 — 알림 · Glass 데모</title>
<link rel="stylesheet" href="tokens.css">
<link rel="stylesheet" href="app.css">
<script src="../assets/preset-loader.js" defer></script>
<script src="app.js" defer></script>
</head>
<body>
<div class="frame">

  <header class="nav" aria-label="상단 바">
    <span class="nav-slot"></span>
    <span class="nav-title t-headline">알림</span>
    <span class="nav-slot right">
      <button class="btn-plain regular" type="button" onclick="gBanner('편집할 알림을 선택해 주세요')">편집</button>
    </span>
  </header>

  <main class="scroll" id="scroll">
    <div class="large-title">
      <h1 class="t-large-title">알림</h1>
    </div>

    <div class="group-first pad">
      <div class="segment" data-segment data-onchange="onSegNoti" role="tablist" aria-label="알림 필터">
        <span class="segment-pill" aria-hidden="true"></span>
        <button class="segment-opt is-active" type="button" role="tab">전체</button>
        <button class="segment-opt" type="button" role="tab">읽지 않음</button>
      </div>
    </div>

    <div id="noti-lists">
      <!-- 오늘 -->
      <section class="group" aria-label="오늘">
        <h2 class="group-header t-footnote">오늘</h2>
        <div class="list stagger">
          <div class="cell cell--icon is-static" style="align-items: flex-start">
            <span class="cell-icon tint-primary" aria-hidden="true"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><circle cx="12" cy="12" r="8"/><circle cx="12" cy="12" r="3.5"/></svg></span>
            <span class="cell-main">
              <span style="display: flex; align-items: baseline; gap: var(--space-2)"><span class="t-headline" style="flex: 1">김서준님이 활동을 공유했어요</span><span class="t-caption-1 c-sub num" style="flex: none">오전 9:24</span></span>
              <span class="t-subhead sub">오늘 이동 목표를 함께 달성했어요. 확인해 보세요.</span>
            </span>
          </div>
          <div class="cell cell--icon is-static" style="align-items: flex-start">
            <span class="cell-icon tint-accent" aria-hidden="true"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="13" cy="4" r="1.4" fill="currentColor" stroke="none"/><path d="M6 21l3-6 3 2 1-4-4-3 4-2 3 4h3"/></svg></span>
            <span class="cell-main">
              <span style="display: flex; align-items: baseline; gap: var(--space-2)"><span class="t-headline" style="flex: 1">오늘은 한강공원 러닝 어때요?</span><span class="t-caption-1 c-sub num" style="flex: none">오전 7:00</span></span>
              <span class="t-subhead sub">어제보다 선선해요. 가볍게 5 km를 추천해요.</span>
            </span>
          </div>
          <div class="cell cell--icon is-static" style="align-items: flex-start">
            <span class="cell-icon tint-success" aria-hidden="true"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 13l4 4 10-11"/></svg></span>
            <span class="cell-main">
              <span style="display: flex; align-items: baseline; gap: var(--space-2)"><span class="t-headline" style="flex: 1">어제 이동 목표를 채웠어요</span><span class="t-caption-1 c-sub num" style="flex: none">오전 6:12</span></span>
              <span class="t-subhead sub">3일 연속으로 링을 완성했어요.</span>
            </span>
          </div>
        </div>
      </section>

      <!-- 이번 주 -->
      <section class="group" aria-label="이번 주">
        <h2 class="group-header t-footnote">이번 주</h2>
        <div class="list stagger">
          <div class="cell cell--icon is-static" style="align-items: flex-start">
            <span class="cell-icon tint-danger" aria-hidden="true"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12h4l2-5 3 10 2-5h4"/></svg></span>
            <span class="cell-main">
              <span style="display: flex; align-items: baseline; gap: var(--space-2)"><span class="t-headline" style="flex: 1">휴식 심박이 안정적이에요</span><span class="t-caption-1 c-sub num" style="flex: none">화요일</span></span>
              <span class="t-subhead sub">지난 7일 평균 62 bpm이에요.</span>
            </span>
          </div>
          <div class="cell cell--icon is-static" style="align-items: flex-start">
            <span class="cell-icon tint-primary" aria-hidden="true"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 12a8 8 0 1 1-8-8"/><path d="M20 4v5h-5"/></svg></span>
            <span class="cell-main">
              <span style="display: flex; align-items: baseline; gap: var(--space-2)"><span class="t-headline" style="flex: 1">건강 데이터를 백업했어요</span><span class="t-caption-1 c-sub num" style="flex: none">월요일</span></span>
              <span class="t-subhead sub">7월 8일 오전 2:00에 저장했어요.</span>
            </span>
          </div>
        </div>
      </section>
    </div>

    <!-- §6.11 빈 상태 (읽지 않음 0건) -->
    <div class="empty" id="noti-empty" role="status">
      <svg class="empty-icon" width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M6 9a6 6 0 0 1 12 0c0 5 2 6 2 6H4s2-1 2-6z"/><path d="M10 20a2 2 0 0 0 4 0"/></svg>
      <span class="t-title-3">새 알림이 없어요</span>
      <span class="empty-desc t-subhead">확인할 알림이 오면 여기에 표시돼요.</span>
    </div>

    <div class="tail"></div>
  </main>

  <nav class="tabbar" aria-label="주 메뉴">
    <a class="tab" href="screen-1.html">
      <svg width="25" height="25" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true"><circle cx="12" cy="12" r="8.5"/><circle cx="12" cy="12" r="4"/></svg>
      <span>요약</span></a>
    <a class="tab" href="screen-4.html">
      <svg width="25" height="25" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3 12h3l2-6 4 14 3-9 2 3h3"/></svg>
      <span>운동</span></a>
    <a class="tab" href="screen-2.html">
      <svg width="25" height="25" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="3"/><path d="M12 3v2M12 19v2M4.2 4.2l1.4 1.4M18.4 18.4l1.4 1.4M3 12h2M19 12h2M4.2 19.8l1.4-1.4M18.4 5.6l1.4-1.4"/></svg>
      <span>설정</span></a>
    <a class="tab" href="screen-5.html" aria-current="page">
      <svg width="25" height="25" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M6 9a6 6 0 0 1 12 0c0 5 2 6 2 6H4s2-1 2-6z"/><path d="M10 20a2 2 0 0 0 4 0"/></svg>
      <span>알림</span></a>
  </nav>

</div>
<script>
  window.onSegNoti = function (i) {
    var lists = document.getElementById('noti-lists');
    var empty = document.getElementById('noti-empty');
    if (!lists || !empty) return;
    var unread = i === 1;
    lists.style.display = unread ? 'none' : '';
    empty.classList.toggle('show', unread);
  };
</script>
</body>
</html>
