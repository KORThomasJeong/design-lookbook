<!DOCTYPE html>
<html lang="ko" data-preset="11" data-variants="a,b" data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>가자 — 차량 선택 · Asphalt 데모</title>
<link rel="stylesheet" href="tokens.css">
<link rel="stylesheet" href="app.css">
<style>
/* screen-2 차량 선택 (§9) — 지도 위 바텀시트 */
.car-sheet {
  position: absolute; left: 0; right: 0; bottom: 0; z-index: 15;
  background: var(--color-surface-raised);
  border-radius: var(--radius-lg) var(--radius-lg) 0 0;
  box-shadow: var(--shadow-3);
  padding: var(--space-2) var(--space-4) calc(var(--space-4) + env(safe-area-inset-bottom));
}
.sheet-head { display: flex; align-items: center; justify-content: space-between; margin: var(--space-1) 0 var(--space-4); }
.surge { display: flex; align-items: center; gap: var(--space-2); margin-bottom: var(--space-4); }
.opt-name { font-size: var(--font-size-body); font-weight: var(--font-weight-medium); }
.opt-sub { font-size: var(--font-size-body-sm); color: var(--color-text-sub); margin-top: var(--space-1); }
.opt-fare { margin-left: auto; font-family: var(--font-mono); font-variant-numeric: tabular-nums; font-size: var(--font-size-body-lg); font-weight: var(--font-weight-bold); }
.opt-check { color: var(--color-accent); opacity: 0; transition: opacity var(--motion-fast) var(--ease-standard); }
.opt[aria-pressed="true"] .opt-check { opacity: 1; }
.cta-wrap { margin-top: var(--space-5); }
</style>
<script src="../assets/preset-loader.js" defer></script>
<script src="app.js" defer></script>
</head>
<body>
<div class="app">

  <div class="map-stage" role="img" aria-label="출발지에서 목적지까지 경로가 표시된 회색조 지도.">
    <svg class="map-svg" viewBox="0 0 390 640" preserveAspectRatio="xMidYMid slice" aria-hidden="true">
      <g class="map-road" stroke-width="18"><path d="M-20 160 H410"/><path d="M-20 470 H410"/></g>
      <g class="map-road" stroke-width="12"><path d="M110 -20 V660"/><path d="M290 -20 V660"/></g>
      <g class="map-road" stroke-width="7"><path d="M-20 320 H410"/><path d="M200 -20 V660"/></g>
      <!-- 경로선 (§7 draw) -->
      <path class="map-route route-draw" d="M110 500 L110 320 L200 320 L200 160 L290 160"/>
      <!-- 출발 / 도착 -->
      <circle class="pin-accent" cx="110" cy="500" r="8"/>
      <circle cx="110" cy="500" r="8" fill="none" stroke="var(--color-bg)" stroke-width="3"/>
      <path class="pin-fill" d="M290 132c-8 0-14 6-14 14 0 10 14 22 14 22s14-12 14-22c0-8-6-14-14-14z"/>
      <circle cx="290" cy="146" r="5" fill="var(--color-bg)"/>
    </svg>

    <button class="map-back" type="button" aria-label="뒤로" onclick="location.href='screen-1.html'">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M15 5l-7 7 7 7"/></svg>
    </button>

    <!-- 바텀시트 (§6.7) peek -->
    <section class="car-sheet page-enter" aria-label="차량 선택">
      <div class="grabber" aria-hidden="true"></div>
      <div class="sheet-head">
        <h1 class="t-title2">차량 선택</h1>
        <span class="t-body-sm sub">강남역까지 4.2km</span>
      </div>

      <div class="surge">
        <span class="badge badge-warning">요금 인상</span>
        <span class="t-body-sm sub">지금은 수요가 많아 요금이 올라요</span>
      </div>

      <div class="opt-list">
        <button class="opt" type="button" aria-pressed="false" data-fare="9,800원으로 요청">
          <span class="ico-circle" aria-hidden="true">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 13l1.5-4.5A2 2 0 0 1 8.4 7h7.2a2 2 0 0 1 1.9 1.5L19 13"/><path d="M4 13h16v4H4z"/><circle cx="8" cy="17" r="1.4"/><circle cx="16" cy="17" r="1.4"/></svg>
          </span>
          <span>
            <span class="opt-name">가자 라이트</span>
            <span class="opt-sub">3분 · 이수민 기사</span>
          </span>
          <span class="opt-fare">9,800원</span>
          <span class="opt-check" aria-hidden="true">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12.5 10 17.5 19 6.5"/></svg>
          </span>
        </button>
        <button class="opt" type="button" aria-pressed="true" data-fare="12,400원으로 요청">
          <span class="ico-circle" aria-hidden="true">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 13l1.8-5.2A2.2 2.2 0 0 1 7.9 6h8.2a2.2 2.2 0 0 1 2.1 1.8L20 13"/><path d="M3 13h18v5H3z"/><circle cx="7.5" cy="18" r="1.5"/><circle cx="16.5" cy="18" r="1.5"/></svg>
          </span>
          <span>
            <span class="opt-name">가자 스탠다드</span>
            <span class="opt-sub">3분 · 김도현 기사</span>
          </span>
          <span class="opt-fare">12,400원</span>
          <span class="opt-check" aria-hidden="true">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12.5 10 17.5 19 6.5"/></svg>
          </span>
        </button>
        <button class="opt" type="button" aria-pressed="false" data-fare="19,500원으로 요청">
          <span class="ico-circle" aria-hidden="true">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12l2-6.5A2.4 2.4 0 0 1 7.3 4h9.4a2.4 2.4 0 0 1 2.3 1.5L21 12"/><path d="M2 12h20v6H2z"/><circle cx="7" cy="18" r="1.6"/><circle cx="17" cy="18" r="1.6"/></svg>
          </span>
          <span>
            <span class="opt-name">가자 블랙</span>
            <span class="opt-sub">6분 · 박준영 기사</span>
          </span>
          <span class="opt-fare">19,500원</span>
          <span class="opt-check" aria-hidden="true">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12.5 10 17.5 19 6.5"/></svg>
          </span>
        </button>
      </div>

      <div class="cta-wrap">
        <a class="btn btn-primary" href="screen-3.html"><span id="cta-fare">12,400원으로 요청</span></a>
      </div>
    </section>
  </div>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>
</div>
</body>
</html>
