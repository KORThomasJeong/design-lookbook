<!DOCTYPE html>
<html lang="ko" data-preset="11" data-variants="a,b" data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>가자 — 결제 · Asphalt 데모</title>
<link rel="stylesheet" href="tokens.css">
<link rel="stylesheet" href="app.css">
<style>
/* screen-4 결제·영수증 (§9) — 숫자 위계 최상 */
.pay-method { margin-top: var(--space-6); }
.pm-name { font-size: var(--font-size-body); font-weight: var(--font-weight-medium); }
.sheet-title { margin: var(--space-2) 0 var(--space-3); }
.pm-check { color: var(--color-accent); margin-left: auto; opacity: 0; }
.pm-row[aria-pressed="true"] .pm-check { opacity: 1; }
</style>
<script src="../assets/preset-loader.js" defer></script>
<script src="app.js" defer></script>
</head>
<body>
<div class="app">

  <header class="appbar">
    <button class="icon-btn" type="button" aria-label="뒤로" onclick="location.href='screen-3.html'">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M15 5l-7 7 7 7"/></svg>
    </button>
    <span class="appbar-title">결제</span>
  </header>

  <main class="scroll scroll-pad-cta page-enter">
    <section class="hero" aria-label="결제 금액">
      <p class="t-display2 mono">12,400원</p>
      <p class="t-body-sm sub" style="margin-top: var(--space-2)">가자 스탠다드 · 4.2km · 14분</p>
    </section>

    <section class="section" aria-label="요금 상세">
      <div class="card">
        <div class="fare-line"><span class="k">기본요금</span><span class="v">3,800원</span></div>
        <div class="fare-line"><span class="k">거리요금 4.2km</span><span class="v">5,200원</span></div>
        <div class="fare-line"><span class="k">시간요금 14분</span><span class="v">2,100원</span></div>
        <div class="fare-line"><span class="k">수요 할증</span><span class="v">1,300원</span></div>
        <div class="total-row">
          <span class="t-label">합계</span>
          <span class="mono w700" style="font-size: var(--font-size-body)">12,400원</span>
        </div>
      </div>
    </section>

    <section class="pay-method" aria-label="결제수단">
      <div class="list">
        <button class="row" type="button" onclick="gOpenSheet('pay-sheet')">
          <span class="ico-circle" aria-hidden="true">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="6" width="18" height="12" rx="2"/><path d="M3 10h18"/></svg>
          </span>
          <span class="row-main">
            <span class="row-title" id="pm-label">신한카드</span>
            <span class="row-sub mono">•••• 3456</span>
          </span>
          <span class="chev" aria-hidden="true">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"/></svg>
          </span>
        </button>
      </div>
    </section>
  </main>

  <div class="cta-bar">
    <button class="btn btn-primary" type="button" onclick="gPay()">12,400원 결제</button>
  </div>

  <!-- 결제수단 변경 시트 (§6.7) -->
  <div class="dim" id="dim" onclick="gCloseSheet('pay-sheet')"></div>
  <section class="sheet" id="pay-sheet" role="dialog" aria-modal="true" aria-labelledby="pay-sheet-title">
    <div class="grabber" aria-hidden="true"></div>
    <h2 class="t-title2 sheet-title" id="pay-sheet-title">결제수단</h2>
    <div class="list">
      <button class="row pm-row" type="button" aria-pressed="true" onclick="gPickPay(this,'신한카드')">
        <span class="ico-circle" aria-hidden="true"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="6" width="18" height="12" rx="2"/><path d="M3 10h18"/></svg></span>
        <span class="row-main"><span class="pm-name">신한카드</span><span class="row-sub mono">•••• 3456</span></span>
        <span class="pm-check" aria-hidden="true"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12.5 10 17.5 19 6.5"/></svg></span>
      </button>
      <button class="row pm-row" type="button" aria-pressed="false" onclick="gPickPay(this,'카카오페이')">
        <span class="ico-circle" aria-hidden="true"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="5" width="16" height="14" rx="3"/><path d="M8 12h8"/></svg></span>
        <span class="row-main"><span class="pm-name">카카오페이</span><span class="row-sub">잔액 48,200원</span></span>
        <span class="pm-check" aria-hidden="true"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12.5 10 17.5 19 6.5"/></svg></span>
      </button>
      <button class="row pm-row" type="button" aria-pressed="false" onclick="gPickPay(this,'현금')">
        <span class="ico-circle" aria-hidden="true"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="8"/><path d="M12 8v8M9.5 10.5h3.5a1.5 1.5 0 0 1 0 3H11a1.5 1.5 0 0 0 0 3h3.5"/></svg></span>
        <span class="row-main"><span class="pm-name">현금</span><span class="row-sub">하차 시 결제</span></span>
        <span class="pm-check" aria-hidden="true"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12.5 10 17.5 19 6.5"/></svg></span>
      </button>
    </div>
  </section>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>
</div>

<script>
function gPickPay(el, name) {
  document.querySelectorAll('.pm-row').forEach(function (r) { r.setAttribute('aria-pressed', String(r === el)); });
  document.getElementById('pm-label').textContent = name;
  setTimeout(function () { gCloseSheet('pay-sheet'); }, 160);
}
function gPay() {
  gToast('결제됐어요', { success: true });
  setTimeout(function () { location.href = 'screen-5.html'; }, 1400);
}
</script>
</body>
</html>
